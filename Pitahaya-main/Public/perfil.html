<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Sistema Pitahaya</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- NAV -->
    <nav class="top-nav">
        <div class="logo">SISTEMA PITAHAYA</div>

        <ul class="menu">
            <li><a href="inicio.html">Inicio</a></li>
            <li><a href="mapa.html">Mapa</a></li>
            <li><a href="bioproductos.html">Bioproductos</a></li>
            <li><a href="pedidos.html">Pedidos</a></li>
            <li><a href="perfil.html">Perfil</a></li>
            <li><a href="tipos.html">Tipos</a></li>
        </ul>

        <button id="logoutBtn">Salir</button>
    </nav>

    <!-- PERFIL -->
    <main class="perfil-container">

        <h2>Mi Perfil</h2>

        <div class="perfil-card">

            <div class="perfil-img">
                <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="usuario">
            </div>

            <div class="perfil-info">
                <p><strong>Nombre:</strong> <span id="nombreUsuario"></span></p>
                <p><strong>Correo:</strong> <span id="correoUsuario"></span></p>
                <p><strong>Rol:</strong> <span id="rolUsuario"></span></p>
            </div>

            <div class="chat-flotante">

                <div class="chat-boton" onclick="toggleChat()">
                    🤖
                </div>

                <div class="chat-container oculto" id="chatContainer">
                    <div id="chatBox" class="chat-box"></div>

                    <div class="chat-input">
                        <input type="text" id="userInput" placeholder="Escribe...">
                        <button onclick="responder()">Enviar</button>
                    </div>
                </div>
            </div>

        </div>

    </main>

    <script src="js/script.js"></script>
</body>

</html>
