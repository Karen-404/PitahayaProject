<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Pedidos - Sistema Pitahaya</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <nav class="top-nav">
        <div class="logo">SISTEMA PITAHAYA</div>

        <ul class="menu">
            <li><a href="inicio.html">Inicio</a></li>
            <li><a href="mapa.html">Mapa</a></li>
            <li><a href="bioproductos.html">Bioproductos</a></li>
            <li><a href="pedidos.html">Pedidos</a></li>
            <li><a href="perfil.html">Perfil</a></li>
            <li><a href="tipos.html">Tipos</a></li>

        </ul>

        <button id="logoutBtn">Salir</button>
    </nav>


    <main class="form-page">

        <h2>Solicitud de Cotización</h2>

        <form id="pedidoForm">

            <div class="form-group">
                <label>Nombre del Producto</label>
                <input type="text" id="producto" required>
            </div>

            <div class="form-group">
                <label>Cantidad</label>
                <input type="number" id="cantidad" required>
            </div>

            <div class="form-group">
                <label>Mensaje / Detalles</label>
                <textarea id="mensaje" rows="4"></textarea>
            </div>

            <button type="submit">Enviar Solicitud</button>

        </form>

        <div id="respuesta"></div>

        <div class="chat-flotante">

            <div class="chat-boton" onclick="toggleChat()">
                🤖
            </div>

            <div class="chat-container oculto" id="chatContainer">
                <div id="chatBox" class="chat-box"></div>

                <div class="chat-input">
                    <input type="text" id="userInput" placeholder="Escribe...">
                    <button onclick="responder()">Enviar</button>
                </div>
            </div>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>

</html>
