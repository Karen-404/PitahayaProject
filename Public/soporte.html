<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte T&eacute;cnico - Pitahaya Biotec</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div id="app-nav"></div>

    <main class="page-container">
        <div class="page-header">
            <div class="page-header-left">
                <div class="page-header-icon" style="background:var(--color-primary-soft);color:var(--color-primary);">
                    <i class="fas fa-headset"></i>
                </div>
                <div>
                    <h1>Soporte T&eacute;cnico</h1>
                    <p style="color:var(--color-text-muted);margin:2px 0 0 0;">Solicita ayuda o reporta un problema</p>
                </div>
            </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 300px;gap:24px;">
            <div style="background:var(--color-surface);border-radius:var(--radius-lg);border:1px solid var(--color-border);box-shadow:var(--shadow-sm);overflow:hidden;display:flex;flex-direction:column;height:500px;">
                <div style="padding:14px 20px;background:var(--color-primary);color:white;font-weight:600;display:flex;align-items:center;gap:8px;">
                    <i class="fas fa-comments"></i> Chat de Soporte
                </div>
                <div id="chatMensajes" style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;">
                    <div style="text-align:center;color:var(--color-text-muted);font-size:0.85rem;padding:20px;">Cargando mensajes...</div>
                </div>
                <div style="padding:12px 20px;border-top:1px solid var(--color-border);display:flex;gap:10px;">
                    <textarea id="msgInput" rows="2" placeholder="Escribe tu mensaje de soporte..." style="flex:1;padding:10px;border:1px solid var(--color-border);border-radius:8px;font-family:inherit;font-size:0.88rem;resize:none;background:var(--color-background);color:var(--color-text-primary);"></textarea>
                    <button onclick="enviarMensaje()" style="height:52px;width:52px;border:none;border-radius:8px;background:var(--color-primary);color:white;cursor:pointer;font-size:1.2rem;"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>

            <div>
                <div style="background:var(--color-surface);border-radius:var(--radius-lg);border:1px solid var(--color-border);box-shadow:var(--shadow-sm);padding:20px;margin-bottom:16px;">
                    <h3 style="margin:0 0 12px;font-size:0.95rem;color:var(--color-primary-dark);"><i class="fas fa-phone-alt"></i> Contacto Directo</h3>
                    <p style="margin:0 0 6px;font-size:0.88rem;color:var(--color-text-secondary);"><i class="fas fa-phone"></i> <strong>+593 98 343 9396</strong></p>
                    <p style="margin:0;font-size:0.88rem;color:var(--color-text-secondary);"><i class="fas fa-envelope"></i> soporte@pitahayabiotec.com</p>
                </div>
                <div style="background:var(--color-surface);border-radius:var(--radius-lg);border:1px solid var(--color-border);box-shadow:var(--shadow-sm);padding:20px;">
                    <h3 style="margin:0 0 12px;font-size:0.95rem;color:var(--color-primary-dark);"><i class="fas fa-clock"></i> Horario de Atenci&oacute;n</h3>
                    <p style="margin:0 0 4px;font-size:0.85rem;color:var(--color-text-secondary);">Lun - Vie: 08:00 - 17:00</p>
                    <p style="margin:0;font-size:0.85rem;color:var(--color-text-secondary);">S&aacute;b: 09:00 - 13:00</p>
                </div>
            </div>
        </div>
    </main>

    <script src="js/nav.js"></script>
    <script>
        const userId = localStorage.getItem('userId');
        const userName = localStorage.getItem('userName');
        if (!userId) { window.location.href = 'index.html'; }

        function escapeHTML(str) {
            return String(str).replace(/[&<>"']/g, function(m) {
                if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; if (m === '"') return '&quot;'; return '&#39;';
            });
        }

        async function cargarMensajes() {
            const container = document.getElementById('chatMensajes');
            try {
                const res = await fetch('/api/soporte/' + userId);
                const mensajes = await res.json();
                if (!mensajes.length) {
                    container.innerHTML = '<div style="text-align:center;color:var(--color-text-muted);font-size:0.85rem;padding:30px;">No hay mensajes. Escribe tu consulta.</div>';
                    return;
                }
                container.innerHTML = mensajes.reverse().map(m => {
                    const fecha = new Date(m.created_at).toLocaleString('es-EC');
                    return '<div style="max-width:80%;align-self:flex-end;background:var(--color-primary-soft);border-radius:12px 12px 4px 12px;padding:10px 14px;">'
                        + '<p style="margin:0 0 4px;font-size:0.85rem;color:var(--color-text-primary);">' + escapeHTML(m.mensaje) + '</p>'
                        + '<div style="display:flex;justify-content:space-between;align-items:center;">'
                        + '<small style="color:var(--color-text-muted);font-size:0.7rem;">' + fecha + '</small>'
                        + (m.estado === 'respondido' ? '<small style="color:var(--color-primary);font-weight:600;"><i class="fas fa-check-circle"></i> Respondido</small>' : '<small style="color:var(--color-warning);"><i class="fas fa-clock"></i> Pendiente</small>')
                        + '</div>'
                        + (m.respuesta ? '<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--color-border);background:white;border-radius:8px;padding:8px 10px;">'
                            + '<small style="color:var(--color-primary-dark);font-weight:600;"><i class="fas fa-reply"></i> Soporte:</small>'
                            + '<p style="margin:4px 0 0;font-size:0.82rem;color:var(--color-text-secondary);">' + escapeHTML(m.respuesta) + '</p>'
                            + '</div>' : '')
                        + '</div>';
                }).join('');
                container.scrollTop = container.scrollHeight;
            } catch(e) {
                container.innerHTML = '<div style="text-align:center;color:#e53e3e;font-size:0.85rem;padding:20px;">Error al cargar mensajes</div>';
            }
        }

        async function enviarMensaje() {
            const input = document.getElementById('msgInput');
            const mensaje = input.value.trim();
            if (!mensaje) return;
            input.value = '';
            try {
                const res = await fetch('/api/soporte', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ usuario_id: parseInt(userId), mensaje })
                });
                if (!res.ok) { const r = await res.json(); alert('Error: ' + r.error); return; }
                cargarMensajes();
            } catch(e) { alert('Error de conexion'); }
        }

        document.getElementById('msgInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviarMensaje(); }
        });

        cargarMensajes();
    </script>
</body>
</html>
