<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pitahaya Biotec | Gesti&oacute;n Biotecnol&oacute;gica</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body.login-page-wrapper {
      background-image: url('img/fondoPitahaya.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    body.login-page-wrapper::before {
      content: '';
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 0;
    }
    body.login-page-wrapper > * { position: relative; z-index: 1; }
    .hero h1, .hero p { text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
    .login-container { box-shadow: 0 8px 30px rgba(0,0,0,0.2); }
    body.login-page-wrapper main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
    @media (max-width: 767px) {
      body.login-page-wrapper .login-container { max-width: 95% !important; padding: 20px !important; }
    }
  </style>
</head>
<body class="login-page-wrapper">
  <nav class="login-nav-bar" style="display:flex;align-items:center;justify-content:space-between;">
    <div style="display:flex;align-items:center;gap:10px;">
      <i class="fas fa-leaf"></i>
      <div class="brand">PITAHAYA <span>BIOTEC</span></div>
    </div>
    <select id="loginLangSwitcher" onchange="if(window.switchLanguage)switchLanguage(this.value)" style="background:rgba(255,255,255,0.15);color:white;border:1px solid rgba(255,255,255,0.3);border-radius:8px;padding:6px 12px;font-size:0.8rem;cursor:pointer;">
      <option value="es" style="color:#000;">Español</option>
      <option value="en" style="color:#000;">English</option>
      <option value="qu" style="color:#000;">Kichwa</option>
      <option value="sh" style="color:#000;">Shuar</option>
    </select>
  </nav>

  <header class="hero" style="height:180px;padding:16px 20px;">
    <h1 style="font-size:1.6rem;" data-i18n="index.title">Gesti&oacute;n Sostenible de la Pitahaya</h1>
    <p style="font-size:0.85rem;" data-i18n="index.subtitle">Conservaci&oacute;n, Mejora y Agroindustria (Hylocereus spp)</p>
  </header>

  <main>
    <section class="login-container">
      <h2 data-i18n="index.login_title">Iniciar Sesi&oacute;n</h2>
      <form id="loginForm">
        <div class="form-group">
          <label for="email" data-i18n="index.email">Correo Electr&oacute;nico</label>
          <input type="text" id="email" placeholder="ejemplo@correo.com" required data-i18n-placeholder="index.email">
        </div>
        <div class="form-group">
          <label for="password" data-i18n="index.password">Contrase&ntilde;a</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="********" required>
            <i class="fas fa-eye toggle-password" onclick="togglePassword('password')"></i>
          </div>
        </div>
        <button type="submit" data-i18n="index.login_btn">Ingresar al Sistema</button>
      </form>
      <p class="reg-link" data-i18n="index.new_producer">
        &iquest;Nuevo cliente? <a href="registro.html" data-i18n="index.register_here">Reg&iacute;strate aqu&iacute;</a>
      </p>
      <p style="text-align:center;margin-top:12px;border-top:1px solid var(--color-border);padding-top:12px;">
        <a href="biotec-dashboard.html" style="color:var(--color-text-muted);font-size:0.85rem;" data-i18n="index.guest"><i class="fas fa-eye"></i> Ingresar como invitado</a>
      </p>
    </section>
  </main>

  <footer class="system-footer">
    &copy; 2026 <span>Pitahaya Biotec</span> &mdash; <span data-i18n="index.footer">ESPOCH / INIAP &mdash; Proyecto de Gesti&oacute;n Biotecnol&oacute;gica</span>
  </footer>

  <script src="js/script.js"></script>
  <script src="js/lang.js"></script>
  <script>
    function togglePassword(id) {
      const input = document.getElementById(id);
      const icon = input.parentNode.querySelector('.toggle-password');
      if (!input || !icon) return;
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      var sw = document.getElementById('loginLangSwitcher');
      if (sw && window.getLang) sw.value = getLang();
    });
  </script>
</body>
</html>
