<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pitahaya Biotec | Gesti&oacute;n Biotecnol&oacute;gica</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-image: url('https://images.unsplash.com/photo-1628685091829-9dce0b4e5a4d?w=1600&q=80');
      background-size: cover;
      background-position: center;
      position: relative;
    }
    .login-page::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 0;
    }
    .login-page > * { position: relative; z-index: 1; }
    .login-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 50px;
    }
    .login-topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .login-topbar-left i { color: var(--color-accent); font-size: 1.5rem; }
    .login-topbar-left .brand {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: white;
    }
    .login-topbar-left .brand span { color: var(--color-accent); }
    .login-topbar-right {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .login-topbar-right a {
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      transition: 0.2s;
    }
    .login-topbar-right a:hover { color: white; }
    .login-topbar-right .sep { color: rgba(255,255,255,0.3); font-size: 0.8rem; }
    .login-hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 60px;
    }
    .login-hero h1 {
      color: white;
      font-size: 2.4rem;
      font-weight: 700;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
      margin: 0 0 8px 0;
      text-align: center;
      letter-spacing: 1px;
    }
    .login-hero p {
      color: rgba(255,255,255,0.9);
      font-size: 1rem;
      text-shadow: 0 1px 8px rgba(0,0,0,0.4);
      margin: 0 0 36px 0;
      text-align: center;
    }
    .login-card {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 36px 40px 30px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.3);
    }
    .login-card h2 {
      margin: 0 0 24px 0;
      font-size: 1.3rem;
      color: var(--color-primary);
      font-weight: 700;
      text-align: center;
    }
    .login-card .form-group { margin-bottom: 16px; }
    .login-card label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--color-text-secondary);
      margin-bottom: 5px;
    }
    .login-card input {
      width: 100%;
      height: 48px;
      padding: 0 14px;
      border: 1.5px solid #DDE4EC;
      border-radius: 12px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: 0.2s;
      background: white;
    }
    .login-card input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(22,117,56,0.1);
    }
    .login-card button {
      width: 100%;
      height: 48px;
      background: var(--color-primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 6px;
    }
    .login-card button:hover { background: var(--color-primary-hover); }
    .login-card .reg-link {
      text-align: center;
      margin-top: 18px;
      font-size: 0.85rem;
      color: var(--color-text-muted);
    }
    .login-card .reg-link a {
      color: var(--color-primary);
      font-weight: 600;
      text-decoration: none;
    }
    .login-card .reg-link a:hover { text-decoration: underline; }
    .login-footer {
      text-align: center;
      padding: 16px 20px;
      color: rgba(255,255,255,0.6);
      font-size: 0.8rem;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .login-footer span { color: var(--color-accent); }
    @media (max-width: 640px) {
      .login-topbar { padding: 14px 18px; }
      .login-topbar-right { display: none; }
      .login-hero h1 { font-size: 1.5rem; }
      .login-hero p { font-size: 0.88rem; }
      .login-card { padding: 28px 22px; margin: 0 16px; }
    }
  </style>
</head>
<body class="login-page">

  <div class="login-topbar">
    <div class="login-topbar-left">
      <i class="fas fa-leaf"></i>
      <div class="brand">PITAHAYA <span>BIOTEC</span></div>
    </div>
    <div class="login-topbar-right">
      <a href="index.html">INICIO</a>
      <span class="sep">|</span>
      <a href="biotec-dashboard.html">NOSOTROS</a>
      <span class="sep">|</span>
      <a href="noticias.html">NOTICIAS</a>
      <span class="sep">|</span>
      <a href="investigadores.html">INVESTIGADORES</a>
      <span class="sep">|</span>
      <a href="registro.html">REGISTRO</a>
    </div>
  </div>

  <div class="login-hero">
    <h1>Gesti&oacute;n Sostenible de la Pitahaya</h1>
    <p>Conservaci&oacute;n, Mejora y Agroindustria (Hylocereus spp)</p>

    <div class="login-card">
      <h2>Iniciar Sesi&oacute;n</h2>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Correo Electr&oacute;nico</label>
          <input type="text" id="email" placeholder="ejemplo@correo.com" required>
        </div>
        <div class="form-group">
          <label for="password">Contrase&ntilde;a</label>
          <input type="password" id="password" placeholder="********" required>
        </div>
        <button type="submit">Ingresar al Sistema</button>
      </form>
      <p class="reg-link">
        &iquest;Eres un nuevo productor? <a href="registro.html">Reg&iacute;strate aqu&iacute;</a>
      </p>
    </div>
  </div>

  <div class="login-footer">
    &copy; 2026 <span>Pitahaya Biotec</span> &mdash; ESPOCH / INIAP &mdash; Proyecto de Gesti&oacute;n Biotecnol&oacute;gica
  </div>

  <script src="js/script.js"></script>
</body>
</html>
