<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pitahaya Biotec | Gesti&oacute;n Biotecnol&oacute;gica</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body.login-page-wrapper {
      background-image: url('img/fondoPitahaya.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }
    body.login-page-wrapper::before {
      content: '';
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 0;
    }
    body.login-page-wrapper > * { position: relative; z-index: 1; }
    .hero h1, .hero p { text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
    .login-container { box-shadow: 0 8px 30px rgba(0,0,0,0.2); }
  </style>
</head>
<body class="login-page-wrapper">
  <nav class="login-nav-bar">
    <i class="fas fa-leaf"></i>
    <div class="brand">PITAHAYA <span>BIOTEC</span></div>
  </nav>

  <header class="hero">
    <h1>Gesti&oacute;n Sostenible de la Pitahaya</h1>
    <p>Conservaci&oacute;n, Mejora y Agroindustria (Hylocereus spp)</p>
  </header>

  <main>
    <section class="login-container">
      <h2>Iniciar Sesi&oacute;n</h2>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Correo Electr&oacute;nico</label>
          <input type="text" id="email" placeholder="ejemplo@correo.com" required>
        </div>
        <div class="form-group">
          <label for="password">Contrase&ntilde;a</label>
          <input type="password" id="password" placeholder="********" required>
        </div>
        <button type="submit">Ingresar al Sistema</button>
      </form>
      <p class="reg-link">
        &iquest;Eres un nuevo productor? <a href="registro.html">Reg&iacute;strate aqu&iacute;</a>
      </p>
    </section>
  </main>

  <footer class="system-footer">
    &copy; 2026 <span>Pitahaya Biotec</span> &mdash; ESPOCH / INIAP &mdash; Proyecto de Gesti&oacute;n Biotecnol&oacute;gica
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
