<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Pitahaya Biotec</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body.registro-page-wrapper {
            background-image: url('img/fondoPitahaya.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        body.registro-page-wrapper::before {
            content: '';
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 0;
        }
        body.registro-page-wrapper > * { position: relative; z-index: 1; }
        body.registro-page-wrapper main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        @media (max-width: 767px) {
            body.registro-page-wrapper .login-container { max-width: 95% !important; padding: 20px !important; }
        }
    </style>
</head>
<body class="registro-page-wrapper">
    <nav class="login-nav-bar">
        <div style="display:flex;align-items:center;gap:10px;">
            <i class="fas fa-leaf"></i>
            <div class="brand">PITAHAYA <span>BIOTEC</span></div>
        </div>
        <select id="loginLangSwitcher" onchange="if(window.switchLanguage)switchLanguage(this.value)" style="background:rgba(255,255,255,0.15);color:white;border:1px solid rgba(255,255,255,0.3);border-radius:6px;padding:3px 6px;font-size:0.7rem;cursor:pointer;max-width:70px;">
            <option value="es" style="color:#000;">ES</option>
            <option value="en" style="color:#000;">EN</option>
            <option value="qu" style="color:#000;">QZ</option>
            <option value="sh" style="color:#000;">SH</option>
        </select>
    </nav>

    <main>
        <section class="login-container">
            <h2 data-i18n="registro.title">Crear Cuenta</h2>
            <form id="registroForm">
                <div class="form-group">
                    <label data-i18n="registro.name">Nombre Completo</label>
                    <input type="text" id="nombre" placeholder="Tu nombre" required>
                </div>
                <div class="form-group">
                    <label data-i18n="registro.email">Correo Electr&oacute;nico</label>
                    <input type="email" id="correo" placeholder="correo@ejemplo.com" required>
                </div>
                <input type="hidden" id="roleReg" value="productor">
                <div class="form-group">
                    <label data-i18n="registro.password">Contrase&ntilde;a</label>
                    <div class="password-wrapper">
                        <input type="password" id="passwordReg" placeholder="********" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('passwordReg')"></i>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block" data-i18n="registro.register_btn"><i class="fas fa-user-check"></i> Registrarse</button>
            </form>
            <p class="reg-link">
                <span data-i18n="registro.have_account">&iquest;Ya tienes cuenta?</span> <a href="index.html" data-i18n="registro.login">Inicia sesi&oacute;n</a>
            </p>
        </section>
    </main>

    <footer class="system-footer">
        &copy; 2026 <span>Pitahaya Biotec</span> &mdash; ESPOCH / INIAP &mdash; Proyecto de Gesti&oacute;n Biotecnol&oacute;gica
    </footer>

    <script src="js/script.js"></script>
    <script src="js/lang.js"></script>
    <script>
        function togglePassword(id) {
            const input = document.getElementById(id);
            const icon = input.parentNode.querySelector('.toggle-password');
            if (!input || !icon) return;
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            var sw = document.getElementById('loginLangSwitcher');
            if (sw && window.getLang) sw.value = getLang();
        });
    </script>
</body>
</html>
