<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Pitahaya Biotec</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body.registro-page-wrapper {
            background-image: url('img/fondoPitahaya.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        body.registro-page-wrapper::before {
            content: '';
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 0;
        }
        body.registro-page-wrapper > * { position: relative; z-index: 1; }
        .registro-page { display: flex; align-items: center; justify-content: center; flex: 1; padding: 20px; }
        body.registro-page-wrapper { display: flex; flex-direction: column; min-height: 100vh; }
        .registro-page-wrapper .system-footer { margin-top: 0; }
    </style>
</head>
<body class="registro-page-wrapper">
    <nav class="login-nav-bar">
        <i class="fas fa-leaf"></i>
        <div class="brand">PITAHAYA <span>BIOTEC</span></div>
    </nav>

    <main class="registro-page">
        <section class="login-container" style="margin:0;max-width:700px;padding:40px;">
            <h2>Crear Cuenta</h2>
            <form id="registroForm">
                <div class="form-group">
                    <label>Nombre Completo</label>
                    <input type="text" id="nombre" placeholder="Tu nombre" required style="height:50px;font-size:1rem;">
                </div>
                <div class="form-group">
                    <label>Correo Electr&oacute;nico</label>
                    <input type="email" id="correo" placeholder="correo@ejemplo.com" required style="height:50px;font-size:1rem;">
                </div>
                <div class="form-group">
                    <label>Tipo de Usuario</label>
                    <select id="roleReg" style="height:50px;font-size:1rem;" required>
                        <option value="productor">Productor</option>
                        <option value="investigador">Investigador</option>
                        <option value="tecnico">T&eacute;cnico</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Contrase&ntilde;a</label>
                    <div class="password-wrapper">
                        <input type="password" id="passwordReg" placeholder="********" required style="height:50px;font-size:1rem;">
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('passwordReg')"></i>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;height:50px;font-size:1.05rem;"><i class="fas fa-user-check"></i> Registrarse</button>
            </form>
            <p style="margin-top:20px;color:var(--color-text-muted);text-align:center;">
                &iquest;Ya tienes cuenta? <a href="index.html" style="color:var(--color-primary);font-weight:600;">Inicia sesi&oacute;n</a>
            </p>
        </section>
    </main>

    <footer class="system-footer">
        &copy; 2026 <span>Pitahaya Biotec</span> &mdash; ESPOCH / INIAP &mdash; Proyecto de Gesti&oacute;n Biotecnol&oacute;gica
    </footer>

    <script src="js/script.js"></script>
    <script>
        function togglePassword(id) {
            const input = document.getElementById(id);
            const icon = input.parentNode.querySelector('.toggle-password');
            if (!input || !icon) return;
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
