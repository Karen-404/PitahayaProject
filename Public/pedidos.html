<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pedidos - Pitahaya Biotec</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div id="app-nav"></div>

    <main class="page-container">
        <div class="page-header">
            <div class="page-header-left">
                <div class="page-header-icon" style="background:var(--color-primary-soft);color:var(--color-primary);">
                    <i class="fas fa-shopping-cart"></i>
                </div>
                <div>
                    <h1>Solicitud de Cotizacion</h1>
                </div>
            </div>
        </div>

        <section class="content-card" style="max-width:600px;margin:0 auto;">
            <form id="pedidoForm">
                <div class="form-group">
                    <label>Nombre del Producto</label>
                    <input type="text" id="producto" placeholder="Ej: Pulpa de pitahaya congelada" required>
                </div>
                <div class="form-group">
                    <label>Cantidad (kg)</label>
                    <input type="number" id="cantidad" placeholder="0" required>
                </div>
                <div class="form-group">
                    <label>Mensaje / Detalles</label>
                    <textarea id="mensaje" rows="4" placeholder="Especificaciones, lugar de entrega, etc."></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;"><i class="fas fa-paper-plane"></i> Enviar Solicitud</button>
            </form>
            <div id="respuesta" style="margin-top:16px;"></div>
        </section>
    </main>

    <div class="chat-flotante">
        <div class="chat-boton" onclick="toggleChat()"><i class="fas fa-robot"></i></div>
        <div class="chat-container oculto" id="chatContainer">
            <div id="chatBox" class="chat-box"></div>
            <div class="chat-input">
                <input type="text" id="userInput" placeholder="Escribe...">
                <button onclick="responder()">Enviar</button>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script src="js/lang.js"></script>
    <script src="js/nav.js"></script>
</body>
</html>
