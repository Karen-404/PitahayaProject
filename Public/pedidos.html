<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title data-i18n="pedidos.title">Pedidos - Pitahaya Biotec</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div id="app-nav"></div>

    <main class="page-container">
        <div class="page-header">
            <div class="page-header-left">
                <div class="page-header-icon" style="background:var(--color-primary-soft);color:var(--color-primary);">
                    <i class="fas fa-shopping-cart"></i>
                </div>
                <div>
                    <h1 data-i18n="pedidos.title">Solicitud de Cotizacion</h1>
                </div>
            </div>
        </div>

        <section class="content-card" style="max-width:600px;margin:0 auto;">
            <form id="pedidoForm">
                <div class="form-group">
                    <label>Nombre del Producto</label>
                    <input type="text" id="producto" placeholder="Ej: Pulpa de pitahaya congelada" required>
                </div>
                <div class="form-group">
                    <label>Cantidad (kg)</label>
                    <input type="number" id="cantidad" placeholder="0" required>
                </div>
                <div class="form-group">
                    <label>Mensaje / Detalles</label>
                    <textarea id="mensaje" rows="4" placeholder="Especificaciones, lugar de entrega, etc."></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;"><i class="fas fa-paper-plane"></i> Enviar Solicitud</button>
            </form>
            <div id="respuesta" style="margin-top:16px;"></div>
        </section>
    </main>

    <div class="chat-flotante">
        <div class="chat-boton" onclick="toggleChat()"><i class="fas fa-robot"></i></div>
        <div class="chat-container oculto" id="chatContainer">
            <div id="chatBox" class="chat-box"></div>
            <div class="chat-input">
                <input type="text" id="userInput" placeholder="Escribe..." data-i18n-placeholder="chat.write">
                <button onclick="responder()" data-i18n="chat.send">Enviar</button>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script src="js/lang.js"></script>
    <script src="js/nav.js"></script>
    <!-- Login Modal -->
    <div id="loginModal" class="modal" style="display:none;">
        <div class="modal-content" style="max-width:400px;">
            <span class="modal-close" onclick="document.getElementById('loginModal').style.display='none'">&times;</span>
            <h3 style="margin:0 0 16px;color:var(--color-primary-dark);">Inicia sesi&oacute;n para enviar tu solicitud</h3>
            <form id="miniLoginForm">
                <div class="form-group">
                    <label>Correo Electr&oacute;nico</label>
                    <input type="text" id="miniEmail" placeholder="correo@ejemplo.com" required>
                </div>
                <div class="form-group">
                    <label>Contrase&ntilde;a</label>
                    <input type="password" id="miniPassword" placeholder="********" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;"><i class="fas fa-sign-in-alt"></i> Iniciar Sesi&oacute;n</button>
            </form>
            <p style="text-align:center;margin-top:16px;font-size:0.85rem;color:var(--color-text-secondary);">
                &iquest;No tienes cuenta? <a href="registro.html" style="color:var(--color-primary);font-weight:600;">Reg&iacute;strate</a>
            </p>
            <p id="miniLoginError" style="color:var(--color-danger);font-size:0.85rem;text-align:center;margin:8px 0 0;display:none;"></p>
        </div>
    </div>
    <script>
        var pedidoForm = document.getElementById('pedidoForm');
        pedidoForm.onsubmit = null;

        pedidoForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            var uid = localStorage.getItem('userId');
            if (!uid) {
                document.getElementById('loginModal').style.display = 'flex';
                return;
            }
            var producto = document.getElementById('producto').value;
            var cantidad = document.getElementById('cantidad').value;
            var mensaje = document.getElementById('mensaje').value;
            try {
                var res = await fetch('/api/pedidos', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ usuario_id: parseInt(uid), producto, cantidad: parseInt(cantidad), mensaje })
                });
                var data = await res.json();
                var resp = document.getElementById('respuesta');
                if (!res.ok) { resp.innerHTML = '<div class="alert-error">Error al enviar pedido</div>'; return; }
                resp.innerHTML = '<div class="alert-success">Pedido enviado correctamente</div>';
                this.reset();
            } catch(err) { document.getElementById('respuesta').innerHTML = '<div class="alert-error">Error de conexion</div>'; }
        });

        document.getElementById('miniLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            var email = document.getElementById('miniEmail').value.trim();
            var password = document.getElementById('miniPassword').value.trim();
            try {
                var res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ correo: email, password })
                });
                var data = await res.json();
                if (!res.ok) { document.getElementById('miniLoginError').textContent = data.error; document.getElementById('miniLoginError').style.display = 'block'; return; }
                localStorage.setItem('userRole', data.role);
                localStorage.setItem('userName', data.nombre);
                localStorage.setItem('userId', data.id);
                localStorage.setItem('userEmail', data.correo);
                if (data.token) localStorage.setItem('userToken', data.token);
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('pedidoForm').dispatchEvent(new Event('submit'));
            } catch(e) { document.getElementById('miniLoginError').textContent = 'Error de conexion'; document.getElementById('miniLoginError').style.display = 'block'; }
        });
        document.addEventListener('languageChanged', function() { if (typeof translateDOM === 'function') translateDOM(); });
    </script>
</body>
</html>
