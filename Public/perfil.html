<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Pitahaya Biotec</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div id="app-nav"></div>

    <main class="page-container">
        <div class="page-header">
            <div class="page-header-left">
                <div class="page-header-icon" style="background:var(--color-primary-soft);color:var(--color-primary);">
                    <i class="fas fa-user"></i>
                </div>
                <div>
                    <h1>Mi Perfil</h1>
                </div>
            </div>
        </div>

        <section class="content-card" style="max-width:500px;margin:0 auto;text-align:center;">
            <div style="width:80px;height:80px;border-radius:50%;background:var(--color-primary-soft);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:2.5rem;color:var(--color-primary);">
                <i class="fas fa-user-circle"></i>
            </div>
            <div style="text-align:left;">
                <p style="padding:8px 0;border-bottom:1px solid var(--color-border);display:flex;justify-content:space-between;">
                    <strong>Nombre:</strong> <span id="nombreUsuario"></span>
                </p>
                <p style="padding:8px 0;border-bottom:1px solid var(--color-border);display:flex;justify-content:space-between;">
                    <strong>Correo:</strong> <span id="correoUsuario"></span>
                </p>
                <p style="padding:8px 0;display:flex;justify-content:space-between;">
                    <strong>Rol:</strong> <span id="rolUsuario"></span>
                </p>
            </div>
        </section>
    </main>

    <div class="chat-flotante">
        <div class="chat-boton" onclick="toggleChat()"><i class="fas fa-robot"></i></div>
        <div class="chat-container oculto" id="chatContainer">
            <div id="chatBox" class="chat-box"></div>
            <div class="chat-input">
                <input type="text" id="userInput" placeholder="Escribe...">
                <button onclick="responder()">Enviar</button>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script src="js/lang.js"></script>
    <script src="js/nav.js"></script>
</body>
</html>
