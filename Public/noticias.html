<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noticias - Pitahaya Biotec</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div id="app-nav"></div>

  <main class="page-container">
    <div class="page-header">
      <div class="page-header-left">
        <div class="page-header-icon" style="background:var(--color-primary-soft);color:var(--color-primary);">
          <i class="fas fa-newspaper"></i>
        </div>
        <div>
          <h1>Noticias e Investigaciones</h1>
        </div>
      </div>
      <div class="page-header-right">
        <button class="btn btn-primary" id="btnNuevaNoticia" style="display:none" onclick="abrirModal()">
          <i class="fas fa-plus"></i> Nueva Noticia
        </button>
      </div>
    </div>

    <div id="noticiasContainer" class="noticias-grid"></div>

    <div id="noticiaModal" class="modal" style="display:none">
      <div class="modal-content">
        <span class="modal-close" onclick="cerrarModal()">&times;</span>
        <h2 id="modalTitle">Nueva Noticia</h2>
        <form id="noticiaForm">
          <input type="hidden" id="noticiaId">
          <div class="form-group">
            <label>Titulo</label>
            <input type="text" id="noticiaTitulo" required>
          </div>
          <div class="form-group">
            <label>Contenido</label>
            <textarea id="noticiaContenido" rows="6" required></textarea>
          </div>
          <div class="form-group">
            <label>Im&aacute;genes (hasta 10)</label>
            <input type="file" id="noticiaFiles" accept="image/*" multiple style="height:auto;padding:8px 0;border:none;">
            <div id="imagenSubiendo" style="display:none;color:var(--color-text-muted);font-size:0.85rem;margin-top:6px;"><i class="fas fa-spinner fa-spin"></i> Subiendo im&aacute;genes...</div>
            <div id="previewsContainer" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;"></div>
            <input type="hidden" id="noticiaImagenes">
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;" id="btnGuardarNoticia">Publicar</button>
        </form>
      </div>
    </div>
  </main>

  <div class="chat-flotante">
    <div class="chat-boton" onclick="toggleChat()"><i class="fas fa-robot"></i></div>
    <div class="chat-container oculto" id="chatContainer">
      <div id="chatBox" class="chat-box"></div>
      <div class="chat-input">
        <input type="text" id="userInput" placeholder="Escribe...">
        <button onclick="responder()">Enviar</button>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
  <script src="js/lang.js"></script>
  <script src="js/nav.js"></script>
  <script>
    const userId = localStorage.getItem('userId');
    const userRole = localStorage.getItem('userRole');

    if (userRole === 'admin' || userRole === 'investigador' || userRole === 'tecnico') {
      document.getElementById('btnNuevaNoticia').style.display = 'inline-flex';
    }

    var subiendo = false;
    var imagenesUrls = [];

    function abrirModal(noticia) {
      document.getElementById('noticiaModal').style.display = 'flex';
      document.getElementById('noticiaFiles').value = '';
      document.getElementById('previewsContainer').innerHTML = '';
      if (noticia) {
        document.getElementById('modalTitle').textContent = 'Editar Noticia';
        document.getElementById('btnGuardarNoticia').textContent = 'Actualizar';
        document.getElementById('noticiaId').value = noticia.id;
        document.getElementById('noticiaTitulo').value = noticia.titulo;
        document.getElementById('noticiaContenido').value = noticia.contenido;
        try { imagenesUrls = JSON.parse(noticia.imagen_url || '[]'); } catch(e) { imagenesUrls = noticia.imagen_url ? [noticia.imagen_url] : []; }
        imagenesUrls.forEach(url => {
          const img = document.createElement('img');
          img.src = url; img.style.cssText = 'width:80px;height:80px;object-fit:cover;border-radius:8px;border:2px solid var(--color-primary);';
          document.getElementById('previewsContainer').appendChild(img);
        });
        document.getElementById('noticiaImagenes').value = JSON.stringify(imagenesUrls);
      } else {
        document.getElementById('modalTitle').textContent = 'Nueva Noticia';
        document.getElementById('noticiaForm').reset();
        document.getElementById('noticiaId').value = '';
        document.getElementById('noticiaImagenes').value = '';
        imagenesUrls = [];
      }
    }

    function cerrarModal() { document.getElementById('noticiaModal').style.display = 'none'; }

    document.getElementById('noticiaFiles').addEventListener('change', async function(e) {
      const files = Array.from(e.target.files);
      if (!files.length || subiendo) return;
      if (imagenesUrls.length + files.length > 10) { alert('Maximo 10 imagenes'); return; }
      subiendo = true;
      document.getElementById('imagenSubiendo').style.display = 'block';
      for (const file of files) {
        try {
          const b64 = await new Promise((resolve, reject) => { const r = new FileReader(); r.onload = () => resolve(r.result); r.onerror = reject; r.readAsDataURL(file); });
          const res = await fetch('/api/subir-imagen', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ imagen: b64 }) });
          if (!res.ok) continue;
          const data = await res.json();
          imagenesUrls.push(data.url);
          const img = document.createElement('img');
          img.src = data.url; img.style.cssText = 'width:80px;height:80px;object-fit:cover;border-radius:8px;border:2px solid var(--color-primary);';
          document.getElementById('previewsContainer').appendChild(img);
        } catch(err) {}
      }
      document.getElementById('noticiaImagenes').value = JSON.stringify(imagenesUrls);
      subiendo = false;
      document.getElementById('imagenSubiendo').style.display = 'none';
    });

    document.getElementById('noticiaForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (subiendo) { alert('Espera a que terminen de subir las imagenes'); return; }
      const data = {
        titulo: document.getElementById('noticiaTitulo').value,
        contenido: document.getElementById('noticiaContenido').value,
        imagen_url: document.getElementById('noticiaImagenes').value || null,
        usuario_id: parseInt(userId)
      };
      const id = document.getElementById('noticiaId').value;
      const url = id ? '/api/noticias/' + id : '/api/noticias';
      const method = id ? 'PUT' : 'POST';
      try {
        const res = await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
        const result = await res.json();
        if (!res.ok) { alert('Error: ' + result.error); return; }
        cerrarModal();
        cargarNoticias();
      } catch(err) { alert('Error de conexion'); }
    });

    async function eliminarNoticia(id) {
      if (!confirm('Eliminar esta noticia?')) return;
      try {
        const res = await fetch('/api/noticias/' + id, { method:'DELETE', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ usuario_id: parseInt(userId) }) });
        if (!res.ok) { const r = await res.json(); alert('Error: ' + r.error); return; }
        cargarNoticias();
      } catch(err) { alert('Error de conexion'); }
    }

    async function toggleLike(noticiaId) {
      try {
        const res = await fetch('/api/noticias/' + noticiaId + '/like', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ usuario_id: parseInt(userId) }) });
        cargarNoticias();
      } catch(err) {}
    }

    function escapeHTML(str) {
      return String(str).replace(/[&<>"']/g, function(m) {
        if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; if (m === '"') return '&quot;'; return '&#39;';
      });
    }

    async function cargarComentarios(noticiaId, container) {
      try {
        const res = await fetch('/api/comentarios/' + noticiaId);
        const comentarios = await res.json();
        container.innerHTML = comentarios.map(c => {
          const fecha = new Date(c.created_at).toLocaleDateString('es-EC', { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
          return '<div style="padding:8px 0;border-bottom:1px solid var(--color-border-soft);font-size:0.85rem;">'
            + '<strong>' + escapeHTML(c.usuarios?.nombre || 'Anonimo') + '</strong> '
            + '<span style="color:var(--color-text-muted);font-size:0.75rem;">' + fecha + '</span>'
            + '<p style="margin:4px 0 0;">' + escapeHTML(c.contenido) + '</p></div>';
        }).join('') || '<p style="color:var(--color-text-muted);font-size:0.85rem;">Sin comentarios</p>';
      } catch(e) { container.innerHTML = '<p style="color:var(--color-text-muted);font-size:0.85rem;">Error al cargar comentarios</p>'; }
    }

    async function enviarComentario(noticiaId, input) {
      const contenido = input.value.trim();
      if (!contenido) return;
      try {
        const res = await fetch('/api/comentarios', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ noticia_id: noticiaId, usuario_id: parseInt(userId), contenido }) });
        if (!res.ok) { alert('Error al enviar comentario'); return; }
        input.value = '';
        const container = document.getElementById('comentarios-' + noticiaId);
        if (container) cargarComentarios(noticiaId, container);
      } catch(e) { alert('Error de conexion'); }
    }

    async function cargarNoticias() {
      const container = document.getElementById('noticiasContainer');
      if (!container) return;
      try {
        const res = await fetch('/api/noticias?usuario_id=' + userId);
        const noticias = await res.json();
        container.innerHTML = noticias.map(n => {
          const fecha = new Date(n.fecha).toLocaleDateString('es-EC', { year:'numeric', month:'long', day:'numeric' });
          const likesCount = n.likes && n.likes[0] ? n.likes[0].count : 0;
          const puedeEditar = (userRole === 'admin' || userRole === 'investigador' || userRole === 'tecnico');
          let imagenes = [];
          try { imagenes = JSON.parse(n.imagen_url || '[]'); } catch(e) { if (n.imagen_url) imagenes = [n.imagen_url]; }
          const imgsHtml = imagenes.length ? '<div class="noticia-imgs">' + imagenes.map(url => '<img src="' + escapeHTML(url) + '" alt="' + escapeHTML(n.titulo) + '" class="noticia-img" loading="lazy">').join('') + '</div>' : '<div class="noticia-img-placeholder"><i class="fas fa-leaf"></i></div>';
          const autor = n.usuarios ? n.usuarios.nombre : 'Anonimo';
          const noticiaJson = escapeHTML(JSON.stringify(n));
          return '<div class="noticia-card">'
            + imgsHtml
            + '<div class="noticia-body">'
            + '<div class="noticia-meta">'
            + '<span><i class="far fa-calendar-alt"></i> ' + fecha + '</span>'
            + '<span><i class="far fa-user"></i> ' + escapeHTML(autor) + '</span>'
            + '</div>'
            + '<h3>' + escapeHTML(n.titulo) + '</h3>'
            + '<p>' + escapeHTML(n.contenido.replace(/\n/g, '<br>')) + '</p>'
            + '<div class="noticia-actions">'
            + '<button class="btn-like' + (n.liked ? ' liked' : '') + '" onclick="toggleLike(' + n.id + ')"><i class="fas fa-heart"></i> ' + likesCount + '</button>'
            + (puedeEditar ? '<button class="btn-edit" onclick="abrirModal(' + noticiaJson + ')"><i class="fas fa-edit"></i></button>' : '')
            + (puedeEditar ? '<button class="btn-delete" onclick="eliminarNoticia(' + n.id + ')"><i class="fas fa-trash"></i></button>' : '')
            + '<button class="btn-share" onclick="window.open(\'https://wa.me/?text=' + encodeURIComponent(n.titulo) + '\',\'_blank\')" title="WhatsApp"><i class="fab fa-whatsapp"></i></button>'
            + '<button class="btn-share" onclick="window.open(\'https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(window.location.origin + '/noticias.html?id=' + n.id) + '\',\'_blank\')" title="Facebook"><i class="fab fa-facebook"></i></button>'
            + '</div>'
            + '<div class="noticia-comentarios" style="margin-top:16px;border-top:1px solid var(--color-border);padding-top:12px;">'
            + '<h4 style="margin:0 0 8px 0;font-size:0.9rem;"><i class="far fa-comment"></i> Comentarios</h4>'
            + '<div id="comentarios-' + n.id + '" style="max-height:200px;overflow-y:auto;"></div>'
            + '<div style="display:flex;gap:8px;margin-top:8px;">'
            + '<input type="text" id="comentarioInput-' + n.id + '" placeholder="Escribe un comentario..." style="flex:1;height:38px;font-size:0.85rem;">'
            + '<button onclick="enviarComentario(' + n.id + ', document.getElementById(\'comentarioInput-' + n.id + '\'))" style="height:38px;padding:0 16px;background:var(--color-primary);color:white;border:none;border-radius:6px;cursor:pointer;"><i class="fas fa-paper-plane"></i></button>'
            + '</div></div></div></div>';
        }).join('');
        // Load comments
        noticias.forEach(n => {
          const c = document.getElementById('comentarios-' + n.id);
          if (c) cargarComentarios(n.id, c);
        });
      } catch(err) {
        container.innerHTML = '<p style="text-align:center;color:var(--color-text-muted);padding:40px;">Error al cargar noticias</p>';
      }
    }

    cargarNoticias();
  </script>
</body>
</html>
