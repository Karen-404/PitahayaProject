<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Inicio - Pitahaya Biotec</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div id="app-nav"></div>

  <main class="page-container">
    <section class="content-card" style="text-align:center;padding:48px 32px;">
      <div style="width:64px;height:64px;border-radius:16px;background:var(--color-primary-soft);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:1.8rem;color:var(--color-primary);">
        <i class="fas fa-leaf"></i>
      </div>
      <h1 style="font-size:1.8rem;font-weight:700;color:var(--color-primary-dark);margin:0 0 8px 0;">
        Bienvenido al Sistema Pitahaya
      </h1>
      <p style="font-size:1rem;color:var(--color-text-secondary);max-width:500px;margin:0 auto 24px;">
        Gesti&oacute;n biotecnol&oacute;gica, monitoreo y comercializaci&oacute;n.
      </p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <a href="biotec-dashboard.html" class="btn btn-primary"><i class="fas fa-chart-bar"></i> Dashboard Biotec</a>
        <a href="noticias.html" class="btn btn-secondary"><i class="fas fa-newspaper"></i> Noticias</a>
      </div>
    </section>
  </main>

  <div class="chat-flotante">
    <div class="chat-boton" onclick="toggleChat()"><i class="fas fa-robot"></i></div>
    <div class="chat-container oculto" id="chatContainer">
      <div id="chatBox" class="chat-box"></div>
      <div class="chat-input">
        <input type="text" id="userInput" placeholder="Escribe...">
        <button onclick="responder()">Enviar</button>
      </div>
    </div>
  </div>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="js/script.js"></script>
  <script src="js/nav.js"></script>
</body>
</html>
